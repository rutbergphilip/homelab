---
name: kcal-assistant

on:
  push:
    branches: ["main"]
    paths: ["kcal-assistant/**"]
  pull_request:
    paths: ["kcal-assistant/**"]
  workflow_dispatch: {}

jobs:
  test:
    name: Test
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: kcal-assistant
        run: bun install --frozen-lockfile

      - name: Run tests
        working-directory: kcal-assistant
        run: bun test

  build-push:
    name: Build and push image
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: kcal-assistant
        run: bun install --frozen-lockfile

      - name: Run tests
        working-directory: kcal-assistant
        run: bun test

      - name: Read version
        id: version
        run: echo "version=$(jq -r .version kcal-assistant/package.json)" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: kcal-assistant
          push: true
          platforms: linux/amd64
          tags: |
            rutbergphilip/kcal-assistant:v${{ steps.version.outputs.version }}
            rutbergphilip/kcal-assistant:latest
