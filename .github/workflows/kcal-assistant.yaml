---
name: kcal-assistant

on:
  push:
    branches: ["main"]
    paths: ["kcal-assistant/**"]
  workflow_dispatch: {}

jobs:
  build-push:
    name: Build and push image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Read version
        id: version
        run: echo "version=$(jq -r .version kcal-assistant/package.json)" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: kcal-assistant
          push: true
          platforms: linux/amd64
          tags: |
            rutbergphilip/kcal-assistant:v${{ steps.version.outputs.version }}
            rutbergphilip/kcal-assistant:latest
