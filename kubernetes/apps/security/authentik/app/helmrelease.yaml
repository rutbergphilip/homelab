---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: security
spec:
  interval: 1h
  chart:
    spec:
      chart: authentik
      version: 2025.12.4
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    # Non-secret config only. Secrets are injected via global.env below.
    # NOTE: this chart does NOT support valueFrom under authentik.* — it
    # flattens the whole structure into literal env vars, so the old
    # authentik.secret_key.valueFrom pattern produced garbage. Real secret
    # refs MUST go through global.env (which supports valueFrom.secretKeyRef).
    authentik:
      error_reporting:
        enabled: false
        send_pii: false
      postgresql:
        host: "authentik-postgresql"
        port: 5432
        name: "authentik"
        user: "authentik"
      redis:
        host: "authentik-redis"
        port: 6379

    global:
      # Injected into server + worker; env entries override the chart-generated
      # secret, so these carry the real values from authentik-secrets.
      env:
        - name: AUTHENTIK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: authentik-secrets
              key: secret-key
        - name: AUTHENTIK_POSTGRESQL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-secrets
              key: postgres-password
        - name: AUTHENTIK_REDIS__PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-secrets
              key: redis-password
        - name: AUTHENTIK_BOOTSTRAP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-secrets
              key: bootstrap-password
        - name: AUTHENTIK_BOOTSTRAP_TOKEN
          valueFrom:
            secretKeyRef:
              name: authentik-secrets
              key: bootstrap-token
        - name: AUTHENTIK_BOOTSTRAP_EMAIL
          value: "admin@rutberg.dev"

      # Email intentionally not configured (single-user; no SMTP creds).

    # Server configuration
    server:
      replicas: 2
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          cpu: 500m
          memory: 1Gi
      
      # Probes
      livenessProbe:
        httpGet:
          path: /-/health/live/
          port: http
        initialDelaySeconds: 30
        periodSeconds: 30
      readinessProbe:
        httpGet:
          path: /-/health/ready/
          port: http
        initialDelaySeconds: 15
        periodSeconds: 10

      # Service configuration
      service:
        type: ClusterIP
        port: 80
        annotations: {}

      # Ingress configuration (disabled - we'll create our own)
      ingress:
        enabled: false

    # Worker configuration
    worker:
      replicas: 1
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          cpu: 300m
          memory: 512Mi

    # Persistence - disabled since we use external PostgreSQL
    postgresql:
      enabled: false
    
    redis:
      enabled: false

    # Security context
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000

    # Pod disruption budget
    podDisruptionBudget:
      enabled: true
      minAvailable: 1