# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
#
# Git-managed Authentik objects for homelab forward-auth (single-application
# pattern, one provider+application per protected host).
#
# This file is mounted into authentik-server and -worker via the chart's
# `blueprints.configMaps` and re-applied automatically (~hourly and on file
# change). It is the single source of truth: do NOT edit these objects in the
# UI/API — the next apply overwrites drift. Each file applies as one atomic
# transaction; an invalid entry rolls back the whole file and leaves live
# state untouched.
version: 1
metadata:
  name: homelab-forward-auth
  labels:
    blueprints.goauthentik.io/description: >-
      Forward-auth providers/applications and embedded-outpost assignment,
      managed from git (kubernetes/apps/security/authentik/app/blueprints/).
entries:
  # --------------------------------------------------------------- kcal ----
  # Mirrors the live provider created via API on 2026-07-09 (kcal PRs #369-373).
  - model: authentik_providers_proxy.proxyprovider
    state: present
    id: kcal-provider
    identifiers:
      name: kcal
    attrs:
      mode: forward_single
      external_host: https://kcal.rutberg.dev
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      access_token_validity: hours=1
      refresh_token_validity: days=30
      intercept_header_auth: true
      internal_host_ssl_validation: true
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-entitlements]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/proxy/scope-proxy]]

  - model: authentik_core.application
    state: present
    id: kcal-app
    identifiers:
      slug: kcal
    attrs:
      name: Kcal Tracker
      provider: !KeyOf kcal-provider
      policy_engine_mode: any

  # ------------------------------------------------------------- homarr ----
  - model: authentik_providers_proxy.proxyprovider
    state: present
    id: homarr-provider
    identifiers:
      name: homarr
    attrs:
      mode: forward_single
      external_host: https://dashboard.rutberg.dev
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      access_token_validity: hours=1
      refresh_token_validity: days=30
      intercept_header_auth: true
      internal_host_ssl_validation: true
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-entitlements]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/proxy/scope-proxy]]

  - model: authentik_core.application
    state: present
    id: homarr-app
    identifiers:
      slug: homarr
    attrs:
      name: Homarr
      provider: !KeyOf homarr-provider
      policy_engine_mode: any

  # ------------------------------------------------------------- pihole ----
  - model: authentik_providers_proxy.proxyprovider
    state: present
    id: pihole-provider
    identifiers:
      name: pihole
    attrs:
      mode: forward_single
      external_host: https://pihole.rutberg.dev
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      access_token_validity: hours=1
      refresh_token_validity: days=30
      intercept_header_auth: true
      internal_host_ssl_validation: true
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-entitlements]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/proxy/scope-proxy]]

  - model: authentik_core.application
    state: present
    id: pihole-app
    identifiers:
      slug: pihole
    attrs:
      name: Pi-hole
      provider: !KeyOf pihole-provider
      policy_engine_mode: any

  # --------------------------------------------------- embedded outpost ----
  # CAUTION: `providers` and `config` are FULL REPLACEMENTS on every apply.
  # Every provider that must stay assigned HAS to be listed, and the config
  # dict must stay complete — removing a key here removes it live. When adding
  # an app, append its provider to this list in the same commit.
  - model: authentik_outposts.outpost
    state: present
    identifiers:
      managed: goauthentik.io/outposts/embedded
    attrs:
      providers:
        - !KeyOf kcal-provider
        - !KeyOf homarr-provider
        - !KeyOf pihole-provider
      config:
        log_level: info
        docker_labels: null
        authentik_host: https://auth.rutberg.dev
        docker_network: null
        container_image: null
        docker_map_ports: true
        refresh_interval: minutes=5
        kubernetes_replicas: 1
        kubernetes_namespace: security
        authentik_host_browser: https://auth.rutberg.dev
        object_naming_template: ak-outpost-%(name)s
        authentik_host_insecure: false
        kubernetes_json_patches: null
        kubernetes_service_type: ClusterIP
        kubernetes_ingress_path_type: null
        kubernetes_image_pull_secrets: []
        kubernetes_ingress_class_name: null
        kubernetes_disabled_components: []
        kubernetes_ingress_annotations: {}
        kubernetes_ingress_secret_name: authentik-outpost-tls
        kubernetes_httproute_annotations: {}
        kubernetes_httproute_parent_refs: []
