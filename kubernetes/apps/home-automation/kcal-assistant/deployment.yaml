kind: Deployment
apiVersion: apps/v1
metadata:
  name: kcal-assistant
  labels:
    app: kcal-assistant

spec:
  replicas: 1
  # SQLite on NFS tolerates exactly one writer process; never run two pods.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: kcal-assistant
  template:
    metadata:
      labels:
        app: kcal-assistant

    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: kcal-assistant
          image: rutbergphilip/kcal-assistant:v0.10.1
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 3000
            - name: internal
              containerPort: 3001

          env:
            - name: TZ
              value: "Europe/Stockholm"
            - name: ICA_STORE_ID
              value: "1003421"  # Maxi ICA Stormarknad Nynäshamn
            - name: PORT
              value: "3000"
            - name: DB_PATH
              value: "/app/data/kcal.db"
            # /ui is gated by Authentik forward-auth; the server re-checks the
            # forwarded identity. Setting this switches UI auth from Cloudflare
            # Access to Authentik. Unset => UI fails closed (503).
            - name: AUTHENTIK_ALLOWED_EMAIL
              value: "philiprutberg00@gmail.com"
            - name: MCP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: kcal-assistant-secrets
                  key: MCP_TOKEN

          volumeMounts:
            - name: homelab-storage
              mountPath: /app/data
              subPath: kcal-assistant/data

          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5

          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5

          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi

      volumes:
        - name: homelab-storage
          persistentVolumeClaim:
            claimName: homelab-nfs-pvc
