# Restrict who can reach the kcal pod so the /ui X-authentik-email header
# cannot be forged by a source that bypasses nginx in-cluster. Allowed:
#   - the external ingress-nginx controller (all real traffic — /mcp AND /ui
#     arrive via nginx), and
#   - host + remote-node entities, L7-limited to GET /healthz (kubelet
#     liveness/readiness probes) and GET /internal/summary (Home Assistant
#     runs with hostNetwork for HomeKit/mDNS, so its wall-hub REST sensors
#     arrive with host identity). /ui and /mcp stay unreachable from both,
#     preserving the header-forgery protection.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: kcal-assistant
spec:
  endpointSelector:
    matchLabels:
      app: kcal-assistant
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: network
            app.kubernetes.io/instance: external-ingress-nginx
            app.kubernetes.io/component: controller
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
          rules:
            http:
              - method: "GET"
                path: "/healthz"
              - method: "GET"
                path: "/internal/summary"
