---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: security

resources:
  - postgres.yaml
  - redis.yaml
  - secrets.sops.yaml
  - helmrelease.yaml
  - ingress.yaml

generatorOptions:
  # The HelmRelease references the ConfigMap by its literal name via
  # blueprints.configMaps — a kustomize hash suffix would break the mount.
  disableNameSuffixHash: true

configMapGenerator:
  - name: authentik-blueprints
    files:
      - blueprints/forward-auth.yaml

commonLabels:
  app.kubernetes.io/name: authentik
  app.kubernetes.io/part-of: homelab-security
