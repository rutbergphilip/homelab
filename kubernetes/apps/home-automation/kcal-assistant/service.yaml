apiVersion: v1
kind: Service
metadata:
  name: kcal-assistant
  labels:
    app: kcal-assistant

spec:
  type: ClusterIP
  selector:
    app: kcal-assistant
  ports:
    - name: http
      port: 3000
      targetPort: 3000
    # Cluster-internal summary listener (HA REST sensors). Never referenced by
    # any Ingress — the ingress-facing handler on 3000 does not serve it.
    - name: internal
      port: 3001
      targetPort: 3001
