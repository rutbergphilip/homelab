apiVersion: v1
kind: Service
metadata:
  name: pihole
  annotations:
    lbipam.cilium.io/ips: "192.168.50.24"

spec:
  type: LoadBalancer
  selector:
    app: pihole

  ports:
    - name: dns
      port: 53
      protocol: UDP
      targetPort: 53
    - name: dns-tcp
      port: 53
      protocol: TCP
      targetPort: 53
    - name: web
      port: 80
      protocol: TCP
      targetPort: 80
