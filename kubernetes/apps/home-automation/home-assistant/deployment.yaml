apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-assistant

spec:
  # hostNetwork + single replica: RollingUpdate's surge pod would either wedge
  # on the same node's occupied host port or hop nodes and change the LAN IP
  # under HomeKit's mDNS identity. Recreate avoids both.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: home-assistant
  template:
    metadata:
      labels:
        app: home-assistant

    spec:
      # LAN-native networking: HomeKit bridge pairing + mDNS/zeroconf discovery
      # (and future Matter) need the node's LAN presence — pod-network mDNS
      # never reaches the LAN. ClusterFirstWithHostNet keeps cluster DNS
      # working (kcal REST sensors resolve *.svc.cluster.local).
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      initContainers:
        - name: install-hacs
          image: homeassistant/home-assistant:2025.12
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -euo pipefail
              if [ ! -f /config/custom_components/hacs/manifest.json ]; then
                wget -qO - https://get.hacs.xyz | bash -
              else
                echo "HACS already installed, skipping."
              fi

          volumeMounts:
            - name: homelab-storage
              mountPath: /config
              subPath: home-assistant/config

      containers:
        - name: home-assistant
          image: homeassistant/home-assistant:2025.12
          imagePullPolicy: Always

          resources:
            limits:
              memory: 800Mi
              cpu: 500m
            requests:
              memory: 400Mi
              cpu: 200m

          ports:
            - containerPort: 8123
              name: home-assistant

          volumeMounts:
            - name: homelab-storage
              mountPath: /config
              subPath: home-assistant/config

      volumes:
        - name: homelab-storage
          persistentVolumeClaim:
            claimName: homelab-nfs-pvc
